services:
  rsshub:
    image: diygod/rsshub:chromium-bundled
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      # 缓存 1 小时 (默认 5 分钟太短, 公众号一天发一两篇, 1 小时足够新鲜)
      CACHE_EXPIRE: "3600"
      CACHE_CONTENT_EXPIRE: "21600"
      # 反爬 puppeteer (公众号文章页 anti-scrape)
      PUPPETEER_WS_ENDPOINT: ws://browserless:3000
      # API 密钥保护 (必填!! 防止你 RSSHub 被陌生人滥用)
      # 起服务前自己生成: openssl rand -hex 32 > /tmp/rsshub-key
      # 再 export RSSHUB_ACCESS_KEY=$(cat /tmp/rsshub-key) 让 docker compose 读
      ACCESS_KEY: ${RSSHUB_ACCESS_KEY:?需要设置 RSSHUB_ACCESS_KEY 环境变量}
    depends_on:
      - redis
      - browserless

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  browserless:
    image: browserless/chrome:latest
    restart: unless-stopped
    environment:
      MAX_CONCURRENT_SESSIONS: "1"

volumes:
  redis-data:
