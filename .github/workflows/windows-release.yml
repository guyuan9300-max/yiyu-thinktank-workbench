name: Windows release build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or tag to build"
        required: true
        default: "main"
      signing_provider:
        description: "Signing provider to use after unsigned build"
        required: true
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - sslcom

permissions:
  actions: read
  contents: read

jobs:
  build-unsigned:
    name: Build unsigned Windows installer
    runs-on: windows-latest
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run release:windows

      - name: Upload unsigned Windows artifacts
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned-${{ github.run_id }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  sslcom-esigner:
    name: Sign with SSL.com eSigner
    needs: build-unsigned
    runs-on: ubuntu-latest
    if: ${{ inputs.signing_provider == 'sslcom' }}

    steps:
      - name: Download unsigned Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-unsigned-${{ github.run_id }}
          path: dist

      - name: Locate unsigned installer
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signed
          installer="$(find "$PWD/dist" -maxdepth 1 -type f -name '*.exe' | head -n 1)"
          if [[ -z "$installer" ]]; then
            echo "No unsigned installer found in dist/" >&2
            exit 1
          fi
          echo "installer=$installer" >> "$GITHUB_OUTPUT"

      - name: Sign installer with SSL.com eSigner
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSLCOM_ES_USERNAME }}
          password: ${{ secrets.SSLCOM_ES_PASSWORD }}
          credential_id: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSLCOM_ES_TOTP_SECRET }}
          file_path: ${{ steps.locate.outputs.installer }}
          output_path: ${{ github.workspace }}/signed
          malware_block: false
          override: false
          environment_name: PROD
          clean_logs: true
          jvm_max_memory: 1024M

      - name: Upload SSL.com signed installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-sslcom-signed-${{ github.run_id }}
          path: signed/*.exe
          if-no-files-found: error

  refresh-update-metadata-sslcom:
    name: Refresh Windows update metadata (SSL.com)
    needs:
      - build-unsigned
      - sslcom-esigner
    runs-on: windows-latest
    if: ${{ inputs.signing_provider == 'sslcom' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download unsigned metadata
        uses: actions/download-artifact@v4
        with:
          name: windows-unsigned-${{ github.run_id }}
          path: dist

      - name: Download SSL.com signed installer
        uses: actions/download-artifact@v4
        with:
          name: windows-sslcom-signed-${{ github.run_id }}
          path: signed

      - name: Replace installer and refresh metadata
        shell: pwsh
        run: |
          $signedExe = Get-ChildItem signed -Filter *.exe | Select-Object -First 1
          if (-not $signedExe) { throw "No signed installer found" }
          Copy-Item $signedExe.FullName -Destination (Join-Path "dist" $signedExe.Name) -Force
          npm run release:windows:refresh-metadata -- --exe (Join-Path "dist" $signedExe.Name)

      - name: Upload SSL.com signed Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-sslcom-signed-release-${{ github.run_id }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
