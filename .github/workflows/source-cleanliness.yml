name: Source cleanliness

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  source-cleanliness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check source cleanliness
        run: npm run check:source-cleanliness
