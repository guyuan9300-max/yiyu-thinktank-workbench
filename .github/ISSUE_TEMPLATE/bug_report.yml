name: 缺陷反馈
description: 报告可复现的问题或异常行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请不要在 issue 中粘贴密钥、token、客户隐私数据或内部截图。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序列出如何触发问题。
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本与环境
      placeholder: 例如 macOS 15 / 益语 0.2.2
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 可填写日志摘要、报错片段或脱敏截图。
