name: 功能建议
description: 提出新功能、体验优化或集成建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 这个建议想解决什么使用场景或痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望软件如何支持？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 有没有可以接受的替代做法？
  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      description: 可补充脱敏示例或相关资料链接。
