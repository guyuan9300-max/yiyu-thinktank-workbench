services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      YIYU_CLOUD_DATA_DIR: /data
    volumes:
      - ./data:/data
    expose:
      - "47831"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
