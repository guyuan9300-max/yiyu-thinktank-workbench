log_format yiyu_oauth_safe '$remote_addr - $remote_user [$time_local] "$request_method $uri $server_protocol" '
                            '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

limit_req_zone $binary_remote_addr zone=yiyu_oauth_relay:10m rate=30r/m;

server {
    listen 80;
    server_name oauth.yiyu.love;

    location /.well-known/acme-challenge/ {
        root /var/www/yiyu-site;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name oauth.yiyu.love;

    ssl_certificate /etc/letsencrypt/live/oauth.yiyu.love/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oauth.yiyu.love/privkey.pem;

    access_log /var/log/nginx/yiyu-oauth-relay.access.log yiyu_oauth_safe;
    error_log /var/log/nginx/yiyu-oauth-relay.error.log warn;

    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = /healthz {
        proxy_pass http://127.0.0.1:47840/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /feishu/member/ {
        limit_req zone=yiyu_oauth_relay burst=10 nodelay;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:47840;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
